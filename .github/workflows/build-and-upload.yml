name: Build and Upload to Gofile.io

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    permissions:
      contents: write
      
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.3.1
      
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.2.0
      
    - name: Restore NuGet packages
      run: nuget restore src/MobileShellPlus.sln
      
    - name: Build Solution (x64)
      run: msbuild src/MobileShellPlus.sln /p:Configuration=Release /p:Platform=x64
      
    - name: Build Solution (x86)
      run: msbuild src/MobileShellPlus.sln /p:Configuration=Release /p:Platform=x86
      
    - name: Build Solution (ARM64)
      run: msbuild src/MobileShellPlus.sln /p:Configuration=Release /p:Platform=ARM64
      
    - name: Create Artifact Directory
      run: mkdir artifacts
      
    - name: List Build Output Directories
      run: |
        Write-Host "Listing build output directories:"
        if (Test-Path -Path "src/MobSDes/bin") {
          Get-ChildItem -Path "src/MobSDes/bin" -Recurse -Directory | Select-Object FullName
        } else {
          Write-Host "src/MobSDes/bin directory not found"
        }
      shell: pwsh
      
    - name: Package MobSDes (x64)
      run: |
        mkdir -p artifacts/Windows11MobileShell-x64
        # First check if the expected directory exists
        if (Test-Path -Path "src/MobSDes/bin/x64/Release") {
          cp -r src/MobSDes/bin/x64/Release/* artifacts/Windows11MobileShell-x64/
        } elseif (Test-Path -Path "src/MobSDes/bin/Release/x64") {
          cp -r src/MobSDes/bin/Release/x64/* artifacts/Windows11MobileShell-x64/
        } else {
          # Create a placeholder file to avoid empty zip
          echo "Build output not found" > artifacts/Windows11MobileShell-x64/README.txt
        }
        Compress-Archive -Path artifacts/Windows11MobileShell-x64 -DestinationPath artifacts/Windows11MobileShell-x64.zip
      shell: pwsh
      
    - name: Package MobSDes (x86)
      run: |
        mkdir -p artifacts/Windows11MobileShell-x86
        # First check if the expected directory exists
        if (Test-Path -Path "src/MobSDes/bin/x86/Release") {
          cp -r src/MobSDes/bin/x86/Release/* artifacts/Windows11MobileShell-x86/
        } elseif (Test-Path -Path "src/MobSDes/bin/Release/x86") {
          cp -r src/MobSDes/bin/Release/x86/* artifacts/Windows11MobileShell-x86/
        } else {
          # Create a placeholder file to avoid empty zip
          echo "Build output not found" > artifacts/Windows11MobileShell-x86/README.txt
        }
        Compress-Archive -Path artifacts/Windows11MobileShell-x86 -DestinationPath artifacts/Windows11MobileShell-x86.zip
      shell: pwsh
      
    - name: Package MobSDes (ARM64)
      run: |
        mkdir -p artifacts/Windows11MobileShell-ARM64
        # First check if the expected directory exists
        if (Test-Path -Path "src/MobSDes/bin/ARM64/Release") {
          cp -r src/MobSDes/bin/ARM64/Release/* artifacts/Windows11MobileShell-ARM64/
        } elseif (Test-Path -Path "src/MobSDes/bin/Release/ARM64") {
          cp -r src/MobSDes/bin/Release/ARM64/* artifacts/Windows11MobileShell-ARM64/
        } else {
          # Create a placeholder file to avoid empty zip
          echo "Build output not found" > artifacts/Windows11MobileShell-ARM64/README.txt
        }
        Compress-Archive -Path artifacts/Windows11MobileShell-ARM64 -DestinationPath artifacts/Windows11MobileShell-ARM64.zip
      shell: pwsh
      
    - name: Create All-in-One Package
      run: |
        mkdir -p artifacts/Windows11MobileShell-All
        # Copy all architecture builds
        if (Test-Path -Path "artifacts/Windows11MobileShell-x64") {
          cp -r artifacts/Windows11MobileShell-x64/* artifacts/Windows11MobileShell-All/
        }
        if (Test-Path -Path "artifacts/Windows11MobileShell-x86") {
          mkdir -p artifacts/Windows11MobileShell-All/x86
          cp -r artifacts/Windows11MobileShell-x86/* artifacts/Windows11MobileShell-All/x86/
        }
        if (Test-Path -Path "artifacts/Windows11MobileShell-ARM64") {
          mkdir -p artifacts/Windows11MobileShell-All/ARM64
          cp -r artifacts/Windows11MobileShell-ARM64/* artifacts/Windows11MobileShell-All/ARM64/
        }
        Compress-Archive -Path artifacts/Windows11MobileShell-All -DestinationPath artifacts/Windows11MobileShell-All.zip
      shell: pwsh
      
    - name: Upload to Gofile.io
      id: upload
      run: |
        $response = Invoke-RestMethod -Uri "https://api.gofile.io/getServer"
        $server = $response.data.server
        
        $uploadUrl = "https://$server.gofile.io/uploadFile"
        
        $filePath = "artifacts/Windows11MobileShell-All.zip"
        
        $fileBytes = [System.IO.File]::ReadAllBytes($filePath)
        $fileEnc = [System.Text.Encoding]::GetEncoding('ISO-8859-1').GetString($fileBytes)
        $boundary = [System.Guid]::NewGuid().ToString()
        $LF = "`r`n"
        
        $bodyLines = (
            "--$boundary",
            "Content-Disposition: form-data; name=`"file`"; filename=`"Windows11MobileShell-All.zip`"",
            "Content-Type: application/octet-stream$LF",
            $fileEnc,
            "--$boundary--$LF"
        ) -join $LF
        
        $result = Invoke-RestMethod -Uri $uploadUrl -Method Post -ContentType "multipart/form-data; boundary=`"$boundary`"" -Body $bodyLines
        
        $downloadLink = $result.data.downloadPage
        
        # Set output for next step
        echo "DOWNLOAD_LINK=$downloadLink" >> $env:GITHUB_ENV
        
        # Also write to a file for the release notes
        echo "Download Link: $downloadLink" > artifacts/download_link.txt
      shell: pwsh
      
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Windows11MobileShell
        path: |
          artifacts/*.zip
          artifacts/download_link.txt
        
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Windows 11 Mobile Shell v${{ github.run_number }}
        body: |
          Windows 11 Mobile Shell Release
          
          Download from Gofile.io: ${{ env.DOWNLOAD_LINK }}
        draft: false
        prerelease: false
        files: |
          artifacts/Windows11MobileShell-x64.zip
          artifacts/Windows11MobileShell-x86.zip
          artifacts/Windows11MobileShell-ARM64.zip
          artifacts/Windows11MobileShell-All.zip

